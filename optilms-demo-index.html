  if (stageId === "intake") return (

function OpticalLMSDemo() {
  const [currentStage, setCurrentStage] = useState(0);
  const [eventIndex, setEventIndex] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [showOMA, setShowOMA] = useState(false);

  const stage = STAGES[currentStage];
  const data = STAGE_DATA[stage.id];
  const visibleEvents = data.events.slice(0, eventIndex);

  useEffect(() => {
    if (!isPlaying || eventIndex >= data.events.length) {
      if (isPlaying && eventIndex >= data.events.length) setIsPlaying(false);
      return;
    }
    const id = setTimeout(() => setEventIndex(prev => prev + 1), 700);
    return () => clearTimeout(id);
  }, [isPlaying, eventIndex, data.events.length]);

  const goToStage = (idx) => {
    setCurrentStage(idx);
    setEventIndex(0);
    setIsPlaying(false);
    setShowOMA(false);
  };

  const playStage = () => {
    setEventIndex(0);
    setIsPlaying(true);
  };

  const showAll = () => {
    setEventIndex(data.events.length);
    setIsPlaying(false);
  };

  const nextStage = () => {
    if (currentStage < STAGES.length - 1) goToStage(currentStage + 1);
  };

  const getEventColor = (type) => {
    if (type === "tx") return C.blue;
    if (type === "rx") return C.violet;
    if (type === "success") return C.green;
    if (type === "error") return C.red;
    return C.textMid;
  };

  const getEventIcon = (type) => {
    if (type === "tx") return "▲";
    if (type === "rx") return "▼";
    if (type === "success") return "✓";
    if (type === "error") return "✗";
    return "•";
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'IBM Plex Sans', -apple-system, sans-serif" }}>

      {/* Top Header */}

          <div>

                {i > 0 && (
                  <div style={{
                    position: "absolute", top: 15, left: -2, right: "50%", height: 2,
                    background: isPast || isActive ? C.cyan : C.border,
                    transition: "background 0.3s"
                  }} />
                )}
                {i < STAGES.length - 1 && (
                  <div style={{
                    position: "absolute", top: 15, left: "50%", right: -2, height: 2,
                    background: isPast ? C.cyan : C.border,
                    transition: "background 0.3s"
                  }} />
                )}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", position: "relative", zIndex: 1 }}>
                  <div style={{
                    width: 30, height: 30, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 14,
                    background: isActive ? C.cyanDim : isPast ? C.bgElevated : C.bg,
                    border: `2px solid ${isActive ? C.cyan : isPast ? C.cyan : C.border}`,
                    boxShadow: isActive ? `0 0 16px ${C.cyanGlow}` : "none",
                    transition: "all 0.3s"
                  }}>
                    {isPast ? "✓" : s.icon}
                  </div>
                  <div style={{
                    marginTop: 6, fontSize: 10, fontWeight: isActive ? 700 : 500, textAlign: "center",
                    color: isActive ? C.cyan : isPast ? C.textMid : C.textDim,
                    transition: "color 0.3s"
                  }}>
                    {s.label}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Main Content */}
      <div style={{ display: "flex", gap: 0, minHeight: "calc(100vh - 140px)" }}>
        {/* Left Panel — Order Info */}
        <div style={{ width: 300, borderRight: `1px solid ${C.border}`, padding: 20, flexShrink: 0, overflowY: "auto" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Order Details</div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 3 }}>Job / Patient</div>
            <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace", color: C.cyan }}>{ORDER.id}</div>
            <div style={{ fontSize: 13, color: C.text }}>{ORDER.patient}</div>
            <div style={{ fontSize: 11, color: C.textMid }}>{ORDER.provider}</div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 6 }}>Prescription</div>
            <div style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, lineHeight: 1.8 }}>
              <div style={{ color: C.textDim, marginBottom: 2 }}>{"     SPH    CYL   AX   ADD"}</div>
              <div><span style={{ color: C.blue }}>OD</span> <span style={{ color: C.text }}>{" -2.50  -0.75  180  +2.00"}</span></div>
              <div><span style={{ color: C.violet }}>OS</span> <span style={{ color: C.text }}>{" -3.00  -1.00  005  +2.00"}</span></div>
              <div style={{ borderTop: `1px solid ${C.border}`, marginTop: 6, paddingTop: 6 }}>
                <div><span style={{ color: C.textDim }}>PD:</span> <span style={{ color: C.text }}>31.5 / 32.0</span></div>
                <div><span style={{ color: C.textDim }}>OC:</span> <span style={{ color: C.text }}>22.0 / 22.0</span></div>
              </div>
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 3 }}>Lens</div>
            <div style={{ fontSize: 12, color: C.text }}>{ORDER.lens}</div>
            <div style={{ fontSize: 11, color: C.textMid }}>{ORDER.material}</div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 3 }}>Coating</div>
            <div style={{ fontSize: 12, color: C.text }}>{ORDER.coating}</div>
          </div>
          <div>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 3 }}>Frame</div>
            <div style={{ fontSize: 12, color: C.text }}>{ORDER.frame}</div>
          </div>

          {/* Stage Illustration */}
          <div style={{ marginTop: 20 }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", marginBottom: 8 }}>
              {stage.label} — Visual
            </div>
            <StageIllustration stageId={stage.id} />
          </div>
        </div>

        {/* Center Panel — Stage Activity */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {/* Stage Header */}
          <div style={{ padding: "18px 24px", borderBottom: `1px solid ${C.border}`, background: C.bgCard }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 11, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>
                  Stage {currentStage + 1} of {STAGES.length}
                </div>
                <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em" }}>
                  {stage.icon} {data.title}
                </div>
                {data.device && (
                  <div style={{ marginTop: 6, display: "flex", gap: 16, fontSize: 12, color: C.textMid }}>
                    <span>Device: <span style={{ color: C.amber, fontWeight: 600 }}>{data.device}</span></span>
                    <span>Connection: <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: C.text }}>{data.connection}</span></span>
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={playStage} style={{
                  padding: "8px 18px", borderRadius: 6, border: `1px solid ${C.cyan}44`, background: C.cyanDim,
                  color: C.cyan, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
                }}>
                  ▶ Play
                </button>
                <button onClick={showAll} style={{
                  padding: "8px 18px", borderRadius: 6, border: `1px solid ${C.border}`, background: C.bgElevated,
                  color: C.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
                }}>
                  Show All
                </button>
                {currentStage < STAGES.length - 1 && (
                  <button onClick={nextStage} style={{
                    padding: "8px 18px", borderRadius: 6, border: `1px solid ${C.amber}44`, background: C.amberDim,
                    color: C.amber, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
                  }}>
                    Next Stage →
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* Description */}
          <div style={{ padding: "12px 24px", borderBottom: `1px solid ${C.border}`, fontSize: 13, color: C.textMid, lineHeight: 1.6 }}>
            {data.detail || `The ${stage.label.toLowerCase()} stage processes the job through the ${data.device || 'workstation'}.`}
          </div>

          {/* Event Log */}
          <div style={{ flex: 1, overflowY: "auto", padding: "0" }}>
            {visibleEvents.map((ev, i) => (
              <div key={i} style={{
                padding: "10px 24px", borderBottom: `1px solid ${C.border}06`,
                display: "flex", gap: 14, alignItems: "flex-start",
                animation: "fadeIn 0.3s ease-out",
                background: i === visibleEvents.length - 1 ? `${getEventColor(ev.type)}06` : "transparent"
              }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.textDim, whiteSpace: "nowrap", minWidth: 65, paddingTop: 1 }}>{ev.t}</span>
                <span style={{ color: getEventColor(ev.type), fontWeight: 700, fontSize: 13, minWidth: 14, paddingTop: 1 }}>{getEventIcon(ev.type)}</span>
                <span style={{ fontSize: 12, color: C.text, lineHeight: 1.5, fontFamily: ev.type === "tx" || ev.type === "rx" ? "'IBM Plex Mono', monospace" : "inherit" }}>{ev.msg}</span>
              </div>
            ))}
            {visibleEvents.length === 0 && (
              <div style={{ padding: 60, textAlign: "center", color: C.textDim }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>{stage.icon}</div>
                <div style={{ fontSize: 14 }}>Press <span style={{ color: C.cyan, fontWeight: 600 }}>▶ Play</span> to simulate this stage</div>
                <div style={{ fontSize: 12, marginTop: 4 }}>or <span style={{ color: C.textMid }}>Show All</span> to see all events at once</div>
              </div>
            )}
            {isPlaying && eventIndex < data.events.length && (
              <div style={{ padding: "12px 24px", display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.cyan, animation: "pulse 1s infinite" }} />
                <span style={{ fontSize: 12, color: C.textDim }}>Processing...</span>
              </div>
            )}
            {!isPlaying && eventIndex >= data.events.length && eventIndex > 0 && currentStage < STAGES.length - 1 && (
              <div style={{ padding: "16px 24px" }}>
                <button onClick={nextStage} style={{
                  padding: "12px 24px", borderRadius: 8, border: "none",
                  background: `linear-gradient(135deg, ${C.cyan}, ${C.blue})`,
                  color: C.bg, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                  boxShadow: `0 4px 20px ${C.cyanGlow}`
                }}>
                  Continue to {STAGES[currentStage + 1].icon} {STAGES[currentStage + 1].label} →
                </button>
              </div>
            )}
            {!isPlaying && eventIndex >= data.events.length && currentStage === STAGES.length - 1 && eventIndex > 0 && (
              <div style={{ padding: "24px", textAlign: "center" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.green }}>Job Complete!</div>
                <div style={{ fontSize: 13, color: C.textMid, marginTop: 6 }}>ORD-10247 processed through all 10 stages in 1hr 34min</div>
                <button onClick={() => goToStage(0)} style={{
                  marginTop: 16, padding: "10px 24px", borderRadius: 8, border: `1px solid ${C.cyan}44`,
                  background: C.cyanDim, color: C.cyan, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
                }}>
                  ↺ Replay from Start
                </button>
              </div>
            )}
          </div>
        </div>

        {/* Right Panel — OMA Packet */}
        {data.omaPacket && (
          <div style={{ width: 340, borderLeft: `1px solid ${C.border}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
            <div style={{ padding: "14px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.06em" }}>OMA/DCS Packet</div>
              <button onClick={() => setShowOMA(!showOMA)} style={{
                padding: "4px 12px", borderRadius: 4, border: `1px solid ${C.border}`,
                background: showOMA ? C.cyanDim : "transparent", color: showOMA ? C.cyan : C.textDim,
                fontSize: 10, cursor: "pointer", fontFamily: "inherit", fontWeight: 600
              }}>
                {showOMA ? "HIDE" : "SHOW"}
              </button>
            </div>
            {showOMA && (
              <div style={{ flex: 1, overflowY: "auto", padding: 0 }}>
                <pre style={{
                  margin: 0, padding: 14, fontFamily: "'IBM Plex Mono', monospace", fontSize: 11,
                  lineHeight: 1.7, color: C.text, whiteSpace: "pre-wrap", wordBreak: "break-all"
                }}>
                  {data.omaPacket.split("\n").map((line, i) => {
                    const isTx = line.startsWith(">>");
                    const isRx = line.startsWith("<<");
                    const isLabel = line.match(/^[A-Z_]+=/) && !isTx && !isRx;
                    const isJson = line.trim().startsWith("{") || line.trim().startsWith("}") || line.trim().startsWith('"');
                    let color = C.textMid;
                    if (isTx) color = C.blue;
                    if (isRx) color = C.violet;
                    if (isLabel) color = C.cyan;
                    if (isJson) color = C.amber;
                    return <div key={i} style={{ color }}>{line}</div>;
                  })}
                </pre>
              </div>
            )}
            {!showOMA && (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8, color: C.textDim }}>
                <span style={{ fontSize: 24 }}>📋</span>
                <span style={{ fontSize: 12 }}>Click SHOW to view the raw</span>
                <span style={{ fontSize: 12 }}>OMA/DCS data packet</span>
              </div>
            )}
          </div>
        )}
      </div>


    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(OpticalLMSDemo));
  </script>
</body>
</html>
